<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління Базою Даних</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        cardBg: '#1a1a1a',
                        inputBg: '#262626',
                        borderClr: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 3px; }
        input, select, textarea { padding: 5px 8px !important; font-size: 0.85rem !important; }
    </style>
</head>
<body class="p-3 flex flex-col items-center min-h-screen">

    <div id="authScreen" class="w-full max-w-sm my-auto bg-cardBg border border-borderClr rounded-lg p-5 shadow-2xl hidden">
        <h2 class="text-sm font-bold uppercase tracking-wider text-blue-400 text-center mb-4">Доступ обмежено</h2>
        <p class="text-xs text-gray-400 text-center mb-4">Введіть ваш Telegram ID для входу в систему:</p>
        <div class="flex flex-col gap-3">
            <input type="password" id="tgIdInput" placeholder="Ваш Telegram ID..." class="w-full bg-inputBg border border-borderClr rounded text-white text-center focus:border-blue-500 outline-none py-2 text-sm">
            <button id="btnAuth" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-xs transition">УВІЙТИ</button>
        </div>
        <p id="authError" class="text-[11px] text-red-500 text-center mt-2 hidden">Невірний ID доступу!</p>
    </div>

    <div id="mainContent" class="w-full max-w-md flex flex-col gap-3 hidden">
        
        <div class="bg-cardBg border border-borderClr rounded-lg p-3 shadow-lg">
            <label class="block text-xs font-medium text-gray-400 mb-1">Пошук особи (ПІБ)</label>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Почніть вводити ПІБ..." class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                <ul id="searchResults" class="absolute left-0 right-0 mt-1 bg-inputBg border border-borderClr rounded max-h-48 overflow-y-auto z-50 hidden divide-y divide-borderClr shadow-2xl">
                    <li class="p-2 text-xs text-gray-500 text-center">Завантаження...</li>
                </ul>
            </div>
            <div class="flex justify-between items-center mt-2 text-[11px] text-gray-500">
                <span id="dbStatus">Підключення...</span>
                <button id="btnNewCard" class="text-blue-400 hover:underline">Увімкнути режим створення</button>
            </div>
        </div>

        <div class="flex flex-col gap-1 my-1">
            <div class="text-[10px] text-gray-500 font-mono text-right px-2" id="idDisplay"></div>
            <div id="selectedHeaderPIB" class="text-xl font-black text-white text-center tracking-wide uppercase min-h-[28px] break-words px-2"></div>
        </div>

        <form id="memberForm" class="bg-cardBg border border-borderClr rounded-lg p-3 shadow-lg flex flex-col gap-3 hidden">
            <input type="hidden" id="docId">
            <input type="hidden" id="pibHidden"> 
            <input type="hidden" id="pib_01">
            <input type="hidden" id="pib_main">
            <input type="hidden" id="pib_edit">
            <input type="hidden" id="family_status">

            <div class="space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Стать</label>
                        <select id="stat" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                            <option value="">-- Виберіть --</option>
                            <option value="брат">брат</option>
                            <option value="сестра">сестра</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Дата народження (Excel код)</label>
                        <input type="text" id="d_nar" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Телефон</label>
                        <input type="text" id="tel" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                         <label class="block text-[11px] text-gray-400">Месенджери та контакти</label>
                         <input type="text" id="messengers" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                
                <div class="grid grid-cols-[80px_80px_1fr] gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Освіта</label>
                        <input type="text" id="education" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Соц. ст.</label>
                        <input type="text" id="social_status" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Професія</label>
                        <input type="text" id="profession" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none text-xs">
                    </div>
                </div>
            </div>

            <!-- БЛОК СІМ'Я -->
            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-pink-400 tracking-wider">СІМ'Я</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Сімейний стан</label>
                        <select id="spouse_status" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                            <option value="">виберіть з списку</option>
                            <option value="неодруж.">неодруж.</option>
                            <option value="одр.">одруж.</option>
                            <option value="розлуч.">розлуч.</option>
                            <option value="вдов.">вдов.</option>
                        </select>
                    </div>
                    <div id="partner_id_container" class="hidden">
                        <input type="hidden" id="spouse_id">
                        <div>
                            <label class="block text-[11px] text-gray-400">ПІБ партнера</label>
                            <input type="text" id="partner_name_input" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div id="partner_start_date_container">
                        <label class="block text-[11px] text-gray-400">Дата шлюбу</label>
                        <input type="text" id="d_shlyub_from" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div id="partner_end_date_container" class="hidden">
                        <label class="block text-[11px] text-gray-400">Дата завершення шлюбу</label>
                        <input type="text" id="d_shlyub_end" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex items-center gap-1 cursor-pointer" onclick="toggleChildren()">
                        <label class="block text-[11px] text-gray-400">Діти</label>
                        <span id="childrenArrow" class="text-[10px] text-gray-500">▼</span>
                    </div>
                    <textarea id="dity" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none hidden" rows="3"></textarea>
                </div>
            </div>

            <!-- БЛОК АДРЕСА - ПІСЛЯ СІМ'Ї -->
            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-teal-400 tracking-wider">Адреса проживання</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Населений пункт</label>
                        <input type="text" id="addr_city" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Вулиця</label>
                        <input type="text" id="addr_street" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Будинок</label>
                        <input type="text" id="addr_house" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Корпус</label>
                        <input type="text" id="addr_korpus" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Кв.</label>
                        <input type="text" id="addr_flat" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Основні відомості</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Статус</label>
                        <input type="text" id="status" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-purple-400 tracking-wider">Структура</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Район / Дільниця №</label>
                        <input type="text" id="rayon" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Опіка / Пресвітер</label>
                        <input type="text" id="opika" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Група</label>
                        <input type="text" id="group_name" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Дата водного</label>
                        <input type="text" id="d_vodnogo" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Дата вступу</label>
                        <input type="text" id="d_vstupu" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Сан</label>
                        <input type="text" id="san" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Звідки прибув (примітка)</label>
                        <input type="text" id="zvidky" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Відвідуваність</label>
                        <input type="text" id="vidviduvanist" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Присутність</label>
                        <input type="text" id="prysutnist" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-orange-400 tracking-wider">Історія служіння</h3>
                <div>
                      <label class="block text-[11px] text-orange-400">Служіння</label>
                      <textarea id="slujinnya" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none" rows="4"></textarea>
                </div>
            </div>

            <div class="border-t border-borderClr pt-2 bg-amber-950/20 p-2 rounded border border-amber-900/40 grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] text-amber-500">Причина вибуття</label>
                    <input type="text" id="exit_reason" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-[11px] text-amber-500">Дата вибуття</label>
                    <input type="text" id="exit_date" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-amber-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-xs transition shadow-md">ЗБЕРЕГТИ ЗМІНИ</button>
        </form>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded shadow-lg text-xs font-semibold z-50 opacity-0 transition-opacity duration-300 pointer-events-none">Дані оновлено</div>

    <script type="module">
        // Твій унікальний Telegram ID
        const ALLOWED_TG_ID = "969538290"; 

        // ВСТАВ СЮДИ СВІЙ СЕКРЕТНИЙ КЛЮЧ
        const DB_SECRET = "CXo9DIfFBm1Y4JlKACL7PFPLUFKYjpNgUXyzSRwf";

        const dbBaseUrl = "https://baza-777-default-rtdb.europe-west1.firebasedatabase.app";
        const baseUrl = `${dbBaseUrl}/members.json?auth=${DB_SECRET}`;

        const authScreen = document.getElementById('authScreen');
        const mainContent = document.getElementById('mainContent');
        const tgIdInput = document.getElementById('tgIdInput');
        const btnAuth = document.getElementById('btnAuth');
        const authError = document.getElementById('authError');

        function checkAuth() {
            const savedId = localStorage.getItem('user_tg_id');
            if (savedId === ALLOWED_TG_ID) {
                authScreen.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadDatabase();
            } else {
                authScreen.classList.remove('hidden');
                mainContent.classList.add('hidden');
            }
        }

        btnAuth.onclick = () => {
            const enteredId = tgIdInput.value.trim();
            if (enteredId === ALLOWED_TG_ID) {
                localStorage.setItem('user_tg_id', enteredId);
                authError.classList.add('hidden');
                authScreen.classList.add('hidden');
                mainContent.classList.remove('hidden');
                loadDatabase();
            } else {
                authError.classList.remove('hidden');
            }
        };

        tgIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnAuth.click();
        });

        let allMembers = [];
        const statusEl = document.getElementById('dbStatus');

        function detectGenderWord(pib) {
            if (!pib) return "брат";
            const p = String(pib).trim().toLowerCase();
            const parts = p.split(/\s+/);
            
            for (const part of parts) {
                if (part.endsWith('івна') || part.endsWith('евна') || part.endsWith('овна') || part.endsWith('ична') || part.endsWith('ічна') || part.endsWith('на')) {
                    return "сестра";
                }
            }
            for (const part of parts) {
                if (part.endsWith('ович') || part.endsWith('евич') || part.endsWith('ич')) {
                    return "брат";
                }
            }
            if (p.endsWith('на') || p.endsWith('ва') || p.endsWith('а') || p.endsWith('я')) {
                return "сестра";
            }
            return "брат";
        }

        function togglePartnerIdField() {
            const status = document.getElementById('spouse_status').value;
            const container = document.getElementById('partner_id_container');
            const endDateContainer = document.getElementById('partner_end_date_container');
            const startDateContainer = document.getElementById('partner_start_date_container');
            
            if (container) {
                if (status === "одр.") {
                    container.classList.remove('hidden');
                } else {
                    container.classList.add('hidden');
                }
            }
            
            if (endDateContainer) {
                if (status === "розлуч." || status === "вдов.") {
                    endDateContainer.classList.remove('hidden');
                } else {
                    endDateContainer.classList.add('hidden');
                }
            }

            if (startDateContainer) {
                if (status === "неодруж." || status === "") {
                    startDateContainer.classList.add('hidden');
                } else {
                    startDateContainer.classList.remove('hidden');
                }
            }
        }

        window.toggleChildren = function() {
            const area = document.getElementById('dity');
            const arrow = document.getElementById('childrenArrow');
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                arrow.textContent = '▲';
            } else {
                area.classList.add('hidden');
                arrow.textContent = '▼';
            }
        }

        async function loadDatabase() {
            try {
                statusEl.textContent = "Завантаження...";
                const response = await fetch(baseUrl);
                
                if (!response.ok) throw new Error("Помилка мережі або невірний Secret");
                const data = await response.json();
                
                if (data) {
                    allMembers = [];
                    Object.keys(data).forEach((id) => {
                        const nested = data[id];
                        if (nested) {
                            let pibName = nested["01_PIB"] || nested["pib"] || `Користувач №${id}`;
                            allMembers.push({
                                id: id,
                                pib: pibName,
                                rawData: nested
                            });
                        }
                    });
                    statusEl.textContent = `У базі: ${allMembers.length} осіб`;
                } else {
                    statusEl.textContent = "База порожня";
                }
            } catch (error) {
                console.error("Помилка:", error);
                statusEl.textContent = "Помилка доступу!";
            }
        }

        function updateSelectColor(selectElement) {
            if (selectElement.value === "") {
                selectElement.classList.add('text-gray-500');
            } else {
                selectElement.classList.remove('text-gray-500');
            }
        }

        const spouseStatusEl = document.getElementById('spouse_status');
        spouseStatusEl.addEventListener('change', () => {
            updateSelectColor(spouseStatusEl);
            togglePartnerIdField();
        });

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const selectedHeaderPIB = document.getElementById('selectedHeaderPIB');
        const memberForm = document.getElementById('memberForm');

        searchInput.addEventListener('input', (e) => {
            const txt = e.target.value.trim().toLowerCase();
            if(txt.length < 1) {
                searchResults.classList.add('hidden');
                return;
            }
            
            const matched = allMembers.filter(m => m.pib && String(m.pib).toLowerCase().includes(txt));
            searchResults.innerHTML = '';
            
            if(matched.length === 0) {
                searchResults.innerHTML = '<li class="p-2 text-xs text-gray-500 text-center">Нічого не знайдено</li>';
            } else {
                matched.forEach(m => {
                    const li = document.createElement('li');
                    li.className = 'p-2 text-xs hover:bg-zinc-700 cursor-pointer text-gray-200';
                    li.textContent = `${m.pib} (ID: ${m.id})`;
                    li.onclick = () => selectMember(m.id);
                    searchResults.appendChild(li);
                });
            }
            searchResults.classList.remove('hidden');
        });

        function valOrEmpty(val) {
            return (val === undefined || val === null) ? '' : String(val);
        }

        function parseDityText(text) {
            if (!text || text.trim() === '') return [];
            return text.split('\n').map(line => {
                const parts = line.split('-').map(p => p.trim());
                return { name: parts[0] || '', birthday: parts[1] || '' };
            }).filter(item => item.name || item.birthday);
        }

        function formatDityJson(jsonArray) {
            if (!Array.isArray(jsonArray)) return '';
            return jsonArray.map(item => `${item.name || ''} - ${item.birthday || ''}`).join('\n');
        }

        function safeStringify(arr) {
            if (!arr) return '[]';
            try {
                return JSON.stringify(arr, null, 2);
            } catch(e) {
                return '[]';
            }
        }

        function selectMember(id) {
            const member = allMembers.find(m => m.id === id);
            if(!member) return;

            searchResults.classList.add('hidden');
            searchInput.value = '';
            
            selectedHeaderPIB.textContent = String(member.pib).toUpperCase();
            memberForm.classList.remove('hidden');

            document.getElementById('docId').value = member.id;
            document.getElementById('pibHidden').value = member.pib;
            document.getElementById('idDisplay').textContent = `ID: ${member.id}`;
            document.getElementById('pib_edit').value = valOrEmpty(member.rawData["01_PIB"] || member.rawData["pib"] || member.pib);

            document.getElementById('pib_01').value = valOrEmpty(member.rawData["01_PIB"] || member.rawData["pib"]);
            document.getElementById('pib_main').value = valOrEmpty(member.rawData["pib"] || member.rawData["01_PIB"]);

            const personal = member.rawData["02_OSOBYSTE"] || {};
            const address = member.rawData["03_ADRESA"] || {};
            const structura = member.rawData["04_STRUCTURA"] || {};
            const vybuttya = member.rawData["06_VYBUTTYA"] || {};
            
            const shlyubArray = personal["4_shlyub_history"];
            const shlyubHistory = (Array.isArray(shlyubArray) && shlyubArray.length > 0) ? shlyubArray[0] : {};

            document.getElementById('stat').value = valOrEmpty(personal["2_stat"]);
            document.getElementById('d_nar').value = valOrEmpty(personal["1_d_narodjennya"] || personal["3_d_nar"]);
            document.getElementById('tel').value = valOrEmpty(personal["2_tel"] || personal["phone"] || personal["tel"]);
            
            const povnaSimya = personal["5_povna_simya"];
            if (povnaSimya === true || povnaSimya === "true") {
                document.getElementById('family_status').value = "true";
            } else if (povnaSimya === false || povnaSimya === "false") {
                document.getElementById('family_status').value = "false";
            } else {
                document.getElementById('family_status').value = "";
            }

            document.getElementById('education').value = valOrEmpty(personal["7_osvita"]);
            document.getElementById('profession').value = valOrEmpty(personal["8_profesiya"]);
            document.getElementById('social_status').value = valOrEmpty(personal["6_socialniy"]);
            document.getElementById('messengers').value = valOrEmpty(personal["3_messengers"]);
            document.getElementById('dity').value = formatDityJson(personal["9_dity"]);
            document.getElementById('status').value = valOrEmpty(personal["13_status"]);

            document.getElementById('addr_city').value = valOrEmpty(address["1_misto"] || address["1_nas_punkt"]);
            document.getElementById('addr_street').value = valOrEmpty(address["2_vulycja"] || address["2_vulitsya"]);
            document.getElementById('addr_house').value = valOrEmpty(address["3_budynok"] || address["3_budinok"]);
            document.getElementById('addr_korpus').value = valOrEmpty(address["4_korpus"]);
            document.getElementById('addr_flat').value = valOrEmpty(address["5_kvartyra"] || address["4_kvartira"]);

            document.getElementById('rayon').value = valOrEmpty(structura["1_rayon"] || personal["rayon"]);
            document.getElementById('opika').value = valOrEmpty(structura["4_opika"] || personal["opika"]);
            document.getElementById('group_name').value = valOrEmpty(structura["2_grupa"]);
            document.getElementById('d_vodnogo').value = valOrEmpty(structura["5_d_vodnogo"]);
            document.getElementById('d_vstupu').value = valOrEmpty(structura["6_d_vstupu"]);
            document.getElementById('san').value = valOrEmpty(structura["3_san"]);
            document.getElementById('zvidky').value = valOrEmpty(structura["7_zvidky_primitka"]);
            document.getElementById('vidviduvanist').value = valOrEmpty(structura["8_vidviduvanist"]);
            document.getElementById('prysutnist').value = valOrEmpty(structura["9_prysutnist"]);
            document.getElementById('slujinnya').value = member.rawData["05_ISTORIJA"] ? safeStringify(member.rawData["05_ISTORIJA"]["1_slujinnya"]) : '[]';

            document.getElementById('spouse_status').value = valOrEmpty(shlyubHistory["status"]);
            updateSelectColor(document.getElementById('spouse_status'));
            togglePartnerIdField();
            document.getElementById('d_shlyub_from').value = valOrEmpty(shlyubHistory["d_shlyubu_begin"]);
            document.getElementById('d_shlyub_end').value = valOrEmpty(shlyubHistory["d_shlyubu_end"]);
            const sId = valOrEmpty(shlyubHistory["podruzhzhya_id"] || shlyubHistory["podrujya_id"]);
            document.getElementById('spouse_id').value = sId;
            
            const partner = allMembers.find(m => String(m.id) === String(sId));
            document.getElementById('partner_name_input').value = partner ? partner.pib : (sId ? "" : "");

            document.getElementById('exit_reason').value = valOrEmpty(vybuttya["2_prichina"]);
            document.getElementById('exit_date').value = valOrEmpty(vybuttya["1_d_vybuttya"]);
        }

        document.getElementById('btnNewCard').onclick = () => {
            memberForm.reset();
            const newPib = prompt("Введіть ПІБ для нового запису:");
            if(!newPib) return;
            
            const nextId = allMembers.length > 0 ? Math.max(...allMembers.map(m => parseInt(m.id))) + 1 : 1;
            
            document.getElementById('docId').value = nextId;
            document.getElementById('pibHidden').value = newPib;
            document.getElementById('pib_01').value = newPib;
            document.getElementById('pib_main').value = newPib;
            document.getElementById('stat').value = detectGenderWord(newPib);
            document.getElementById('idDisplay').textContent = `Новий запис ID: ${nextId}`;
            document.getElementById('pib_edit').value = newPib;
            selectedHeaderPIB.textContent = newPib.toUpperCase();
            memberForm.classList.remove('hidden');
            updateSelectColor(document.getElementById('spouse_status'));
            togglePartnerIdField();
        };

        memberForm.onsubmit = async (e) => {
            e.preventDefault();
            const targetId = document.getElementById('docId').value;
            if(!targetId) return;

            const updates = {};
            const editedPibVal = document.getElementById('pib_edit').value.trim();
            const editedPib01 = editedPibVal;
            const editedPibMain = editedPibVal;

            updates[`01_PIB`] = editedPib01;
            updates[`pib`] = editedPibMain;
            
            const computedStat = document.getElementById('stat').value || detectGenderWord(editedPib01 || editedPibMain);
            updates[`02_OSOBYSTE/2_stat`] = computedStat;

            updates[`02_OSOBYSTE/1_d_narodjennya`] = document.getElementById('d_nar').value;
            updates[`02_OSOBYSTE/3_d_nar`] = document.getElementById('d_nar').value;
            updates[`02_OSOBYSTE/2_tel`] = document.getElementById('tel').value;
            updates[`02_OSOBYSTE/phone`] = document.getElementById('tel').value;
            updates[`02_OSOBYSTE/tel`] = document.getElementById('tel').value;
            
            const spouseStatus = document.getElementById('spouse_status').value;
            const spouseName = document.getElementById('partner_name_input').value.trim();
            const partnerMatch = allMembers.find(m => String(m.pib).trim().toLowerCase() === spouseName.toLowerCase());
            const spouseIdVal = partnerMatch ? partnerMatch.id : document.getElementById('spouse_id').value;
            let isPovna = false;
            if (spouseStatus === "одр.") {
                isPovna = (spouseIdVal !== "");
            }
            updates[`02_OSOBYSTE/5_povna_simya`] = isPovna;
            
            updates[`02_OSOBYSTE/7_osvita`] = document.getElementById('education').value;
            updates[`02_OSOBYSTE/8_profesiya`] = document.getElementById('profession').value;
            updates[`02_OSOBYSTE/6_socialniy`] = document.getElementById('social_status').value;
            updates[`02_OSOBYSTE/3_messengers`] = document.getElementById('messengers').value;
            updates[`02_OSOBYSTE/9_dity`] = parseDityText(document.getElementById('dity').value);
            updates[`02_OSOBYSTE/13_status`] = document.getElementById('status').value;
            
            updates[`04_STRUCTURA/1_rayon`] = document.getElementById('rayon').value;
            updates[`04_STRUCTURA/4_opika`] = document.getElementById('opika').value;
            updates[`04_STRUCTURA/2_grupa`] = document.getElementById('group_name').value;
            updates[`04_STRUCTURA/5_d_vodnogo`] = document.getElementById('d_vodnogo').value;
            updates[`04_STRUCTURA/6_d_vstupu`] = document.getElementById('d_vstupu').value;
            updates[`04_STRUCTURA/3_san`] = document.getElementById('san').value;
            updates[`04_STRUCTURA/7_zvidky_primitka`] = document.getElementById('zvidky').value;
            updates[`04_STRUCTURA/8_vidviduvanist`] = document.getElementById('vidviduvanist').value;
            updates[`04_STRUCTURA/9_prysutnist`] = document.getElementById('prysutnist').value;
            try {
                updates[`05_ISTORIJA/1_slujinnya`] = JSON.parse(document.getElementById('slujinnya').value || '[]');
            } catch(e) { updates[`05_ISTORIJA/1_slujinnya`] = []; }
            
            updates[`03_ADRESA/1_misto`] = document.getElementById('addr_city').value;
            updates[`03_ADRESA/1_nas_punkt`] = document.getElementById('addr_city').value;
            updates[`03_ADRESA/2_vulycja`] = document.getElementById('addr_street').value;
            updates[`03_ADRESA/2_vulitsya`] = document.getElementById('addr_street').value;
            updates[`03_ADRESA/3_budynok`] = document.getElementById('addr_house').value;
            updates[`03_ADRESA/3_budinok`] = document.getElementById('addr_house').value;
            updates[`03_ADRESA/4_korpus`] = document.getElementById('addr_korpus').value;
            updates[`03_ADRESA/5_kvartyra`] = document.getElementById('addr_flat').value;
            updates[`03_ADRESA/4_kvartira`] = document.getElementById('addr_flat').value;
 
            updates[`02_OSOBYSTE/4_shlyub_history/0/status`] = document.getElementById('spouse_status').value;
            updates[`02_OSOBYSTE/4_shlyub_history/0/d_shlyubu_begin`] = document.getElementById('d_shlyub_from').value;
            updates[`02_OSOBYSTE/4_shlyub_history/0/d_shlyubu_end`] = document.getElementById('d_shlyub_end').value;
            
            updates[`02_OSOBYSTE/4_shlyub_history/0/podruzhzhya_id`] = partnerMatch ? partnerMatch.id : spouseIdVal;
            updates[`02_OSOBYSTE/4_shlyub_history/0/podrujya_id`] = partnerMatch ? partnerMatch.id : spouseIdVal;
 
            updates[`06_VYBUTTYA/2_prichina`] = document.getElementById('exit_reason').value;
            updates[`06_VYBUTTYA/1_d_vybuttya`] = document.getElementById('exit_date').value;

            const singleMemberUrl = `${dbBaseUrl}/members/${targetId}.json?auth=${DB_SECRET}`;

            try {
                const res = await fetch(singleMemberUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (!res.ok) throw new Error("Помилка збереження через REST");
                
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                
                loadDatabase();
            } catch (error) {
                console.error("Помилка збереження:", error);
                alert("Не вдалося зберегти дані!");
            }
        };

        checkAuth();
    </script>
</body>
</html>
