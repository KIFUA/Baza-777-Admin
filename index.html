        function detectGenderWord(pib) {
            if (!pib) return "брат";
            const p = String(pib).trim().toLowerCase();
            const parts = p.split(/\s+/);
            
            for (const part of parts) {
                if (part.endsWith('івна') || part.endsWith('евна') || part.endsWith('овна') || part.endsWith('ична') || part.endsWith('ічна') || part.endsWith('на')) {
                    return "сестра";
                }
            }
            for (const part of parts) {
                if (part.endsWith('ович') || part.endsWith('евич') || part.endsWith('ич')) {
                    return "брат";
                }
            }
            if (p.endsWith('на') || p.endsWith('ва') || p.endsWith('а') || p.endsWith('я')) {
                return "сестра";
            }
            return "брат";
        }

        function isMergedProfile(m, list) {
            if (!m) return false;
            const rec = m.rawData || {};
            if (rec["02_OSOBYSTE"]?.["13_status"] === "об'єднано") return true;
            
            const pibSelf = String(m.pib || "").trim().toLowerCase();
            if (!pibSelf) return false;
            
            const selfId = Number(m.id);
            return list.some(other => {
                const otherId = Number(other.id);
                if (otherId <= selfId) return false;
                
                const otherPib = String(other.pib || "").trim().toLowerCase();
                if (otherPib !== pibSelf) return false;
                
                const otherRec = other.rawData || {};
                const otherIsLeft = (otherRec["02_OSOBYSTE"]?.["13_status"] === "вибув") || 
                                     (otherRec["06_VYBUTTYA"]?.["2_prichina"]) || 
                                     (otherRec["06_VYBUTTYA"]?.["1_d_vybuttya"]) ||
                                     (otherRec["06_VYBUTTYA"]?.["1_d_vybyttya"]);
                const otherIsMerged = (otherRec["02_OSOBYSTE"]?.["13_status"] === "об'єднано");
                return !otherIsLeft && !otherIsMerged;
            });
        }

        window.formatExcelDateClient = (excelDate) => {
            if (!excelDate) return "";
            const num = Number(excelDate);
            if (isNaN(num) || num <= 0) {
                return String(excelDate).trim();
            }
            try {
                const utc_days = Math.floor(num - 25569);
                const utc_value = utc_days * 86400;
                const d = new Date(utc_value * 1000);
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${dd}.${mm}.${yyyy}`;
            } catch (e) {
                return String(excelDate);
            }
        };

        window.transformAddressString = (str) => {
            if (!str) return '';
            str = str.trim();
            const firstDigitIdx = str.search(/\d/);
            if (firstDigitIdx === -1) return str;
            
            let streetPart = str.substring(0, firstDigitIdx).trim();
            streetPart = streetPart.replace(/,$/, '').trim();
            
            const numPart = str.substring(firstDigitIdx).trim();
            
            const slashParts = numPart.split('/');
            if (slashParts.length > 1) {
                let part1 = slashParts[0].trim();
                let afterSlash = slashParts.slice(1).join('/').trim();
                
                const commaParts = afterSlash.split(',').map(p => p.trim()).filter(Boolean);
                
                const cleanVal = (v) => {
                    return v.replace(/^(б|буд|кор|корп|кв|к|б\.|буд\.|кор\.|корп\.|кв\.|к\.)\s*/i, '').trim();
                };

                let bVal = cleanVal(part1);
                
                if (commaParts.length === 1) {
                    let квVal = cleanVal(commaParts[0]);
                    return `${streetPart}, б. ${bVal}, кв. ${квVal}`;
                } else if (commaParts.length >= 2) {
                    let корVal = cleanVal(commaParts[0]);
                    let квVal = cleanVal(commaParts[1]);
                    return `${streetPart}, б. ${bVal}, кор. ${корVal}, кв. ${квVal}`;
                }
            }
            return str;
        };

        function updateDynamicTimeline(member) {

                 const baptismEvent = dbHistory.find(h => h.podiya === "Водне хрещення");
                 const baptismDate = baptismEvent ? String(baptismEvent.d_podiyi || "").trim() : null;
                 
                 dbHistory.forEach(e => {
                     const div = document.createElement('div');
                     div.className = 'flex items-center gap-2 border-b border-zinc-800/60 py-0.5 md:py-1 last:border-0';
                     
                     let icon = "📝";
                     const pLower = String(e.podiya || "").toLowerCase();
                     if (e.podiya === "Водне хрещення") icon = "🌊";
                     else if (e.podiya === "Вил." || pLower.includes("вилучен")) icon = "🚫";
                     else if (e.podiya === "прийн." || pLower.includes("прийнят")) icon = "📓";
                     else if (e.podiya === "відп." || pLower.includes("вибуття")) icon = "🚪";
                     else if (e.podiya === "емігр.") icon = "✈️";
                     else if (e.podiya === "пом." || pLower.includes("смерть") || pLower.includes("пом.")) icon = "🕊️";
                     else if (pLower.includes("об'єднано")) icon = "🔗";

                     const isAcceptance = e.podiya === "прийн." || pLower.includes("прийнят");
                     const hasSameDateBaptism = isAcceptance && baptismDate && String(e.d_podiyi || "").trim() === baptismDate;
                     const detailsToRender = hasSameDateBaptism ? "" : (e.prychyna_detali || "");

                     let displayPodiya = e.podiya || "";
                     if (isAcceptance) {
                         displayPodiya = "прийн.";
                     }

                     div.innerHTML = `
                         <span class="font-mono text-[9px] text-sky-400 bg-sky-950/80 px-1 py-0.5 rounded border border-sky-900/30 whitespace-nowrap">${e.d_podiyi || "—"}</span>
                         <div class="text-[11px] flex flex-wrap items-center gap-1.5">
                             <span class="font-bold text-gray-200">${icon} ${displayPodiya}</span>
                             ${detailsToRender ? `<span class="text-[10px] text-zinc-400 italic">${detailsToRender}</span>` : ''}
                         </div>
                     `;
                     timelineContainer.appendChild(div);
                 });
                 return;
             }

            const structura = member.rawData["04_STRUCTURA"] || {};
            const vybuttya = member.rawData["06_VYBUTTYA"] || {};
            const personal = member.rawData["02_OSOBYSTE"] || {};
            
            const dVodnogo = String(structura["5_d_vodnogo"] || "").trim();
            const dVstupu = String(structura["6_d_vstupu"] || "").trim();
            const zvidky = String(structura["7_zvidky_primitka"] || "").trim();
            
            const dVybuttya = String(vybuttya["1_d_vybuttya"] || vybuttya["1_d_vybyttya"] || "").trim();
            const prichina = String(vybuttya["2_prichina"] || "").trim();
            const vybuvPrymitka = String(vybuttya["vybuv_prymitka"] || vybuttya["3_primitka"] || vybuttya["primitka"] || "").trim();
            
            const events = [];
            
            // 1. Water Baptism
            if (dVodnogo) {
                events.push({
                    date: dVodnogo,
                    title: "🌊 Водне хрещення",
                    desc: ""
                });
            }
            
            // 2. Formal Entry
            if (dVstupu) {
                let entryTitle = "📎 Прийняття в члени церкви";
                if (zvidky) {
                    entryTitle += ` (${zvidky})`;
                }
                events.push({
                    date: dVstupu,
                    title: entryTitle,
                    desc: ""
                });
            }
            
            // 3. Scan fields for excommunication notes
            const textLower = vybuvPrymitka.toLowerCase();
            const zvidkyLower = zvidky.toLowerCase();
            
            // Check for explicit "вил" pattern
            const excomMatches = vybuvPrymitka.match(/(вил\.|вилуч\.|вилучена|вилучений)\s*(\d{2}[\.\/]\d{2}[\.\/]\d{2,4})/i);
            if (excomMatches) {
                events.push({
                    date: excomMatches[2],
                    title: "🚫 Вилучення з членів церкви",
                    desc: vybuvPrymitka
                });
            } else if (textLower.includes("вилуч") || textLower.includes("блуд") || zvidkyLower.includes("вилуч")) {
                const anyDates = vybuvPrymitka.match(/\d{2}[\.\/]\d{2}[\.\/]\d{2,4}/g) || [];
                if (anyDates.length > 0) {
                    anyDates.forEach(d => {
                        if (d !== dVodnogo && d !== dVstupu && d !== dVybuttya) {
                            events.push({
                                date: d,
                                title: "⚠️ Вилучення (історична позначка)",
                                desc: vybuvPrymitka
                            });
                        }
                    });
                } else if (textLower.includes("вилуч. за блуд") || textLower.includes("вил. за блуд")) {
                    events.push({
                        date: "історична",
                        title: "⚠️ Був вилучений за блуд (згідно з приміткою)",
                        desc: vybuvPrymitka
                    });
                }
            }
            
            // 4. Departure
            if (dVybuttya || prichina || (personal["13_status"] === "вибув")) {
                let exitTitle = "🚪 Вибуття з церкви";
                if (prichina) {
                    exitTitle += ` (причина: ${prichina})`;
                }
                events.push({
                    date: dVybuttya || "н/д",
                    title: exitTitle,
                    desc: vybuvPrymitka
                });
            }

            const parseDateHelper = (str) => {
                if (!str || str === "н/д" || str === "не вказано" || str === "історична") return new Date(0);
                const parts = str.split(/[\.\/]/);
                if (parts.length === 3) {
                    let day = parseInt(parts[0], 10);
                    let month = parseInt(parts[1], 10) - 1;
                    let year = parseInt(parts[2], 10);
                    if (year < 100) {
                        year += (year > 50 ? 1900 : 2000);
                    }
                    return new Date(year, month, day);
                }
                return new Date(0);
            };
            
            events.sort((a, b) => parseDateHelper(a.date) - parseDateHelper(b.date));
            
            const uniqEvents = [];
            const seen = new Set();
            events.forEach(e => {
                const key = `${e.date}_${e.title.slice(0, 10)}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqEvents.push(e);
                }
            });

            if (uniqEvents.length > 0) {
                if (eventsPart) eventsPart.classList.remove('hidden');
                timelineContainer.innerHTML = '';
                uniqEvents.forEach(e => {
                    const div = document.createElement('div');
                    div.className = 'flex items-start gap-2 border-b border-zinc-800/60 py-1.5 last:border-0';
                    div.innerHTML = `
                        <span class="font-mono text-[9px] text-sky-400 bg-sky-950/80 px-1 py-0.5 rounded border border-sky-900/30 whitespace-nowrap self-start mt-0.5">${e.date}</span>
                        <div>
                            <span class="font-bold text-gray-200 block text-[11px]">${e.title}</span>
                            ${e.desc ? `<p class="text-[10px] text-zinc-400 italic">${e.desc}</p>` : ''}
                        </div>
                    `;
                    timelineContainer.appendChild(div);
                });
            } else {
                if (eventsPart) eventsPart.classList.add('hidden');
            }
        }

        // ПОШУК ТА ВИБІР ПАРТНЕРА/ПОДРУЖЖЯ
        const partnerNameInput = document.getElementById('partner_name_input');

        partnerNameInput.oninput = (e) => {
            const txt = e.target.value.toLowerCase().trim();
            if (txt.length < 1) {
                partnerSearchResults.classList.add('hidden');
                return;
            }

            const matched = allMembers.filter(m => m.pib && String(m.pib).toLowerCase().includes(txt));
            partnerSearchResults.innerHTML = '';
            
            if (matched.length === 0) {
                partnerSearchResults.innerHTML = '<li class="p-2 text-xs text-gray-500 text-center">Партнера не знайдено</li>';
            } else {
                matched.forEach(m => {
                    const li = document.createElement('li');
                    li.className = 'p-2 text-xs hover:bg-zinc-700 cursor-pointer text-gray-200 outline-none focus:bg-zinc-700';
                    li.setAttribute('tabindex', '0');
                    li.textContent = `${m.pib} (ID: ${m.id})`;
                    li.onclick = () => {
                        partnerNameInput.value = m.pib;
                        spouseIdInput.value = m.id;
                        partnerSearchResults.classList.add('hidden');
                    };
                    li.onkeydown = (ev) => {
                        if (ev.key === 'ArrowDown') {
                            ev.preventDefault();
                            const next = li.nextElementSibling;
                            if (next) next.focus();
                        } else if (ev.key === 'ArrowUp') {
                            ev.preventDefault();
                            const prev = li.previousElementSibling;
                            if (prev) {
                                prev.focus();
                            } else {
                                partnerNameInput.focus();
                            }
                        } else if (ev.key === 'Enter') {
                            ev.preventDefault();
                            li.click();
                        }
                    };
                    partnerSearchResults.appendChild(li);
                });
            }
            partnerSearchResults.classList.remove('hidden');
        };

            const exitReasonVal = getVal('exit_reason');
            updates[`06_VYBUTTYA/2_prichina`] = exitReasonVal;
            updates[`06_VYBUTTYA/1_d_vybuttya`] = getVal('exit_date');
            updates[`06_VYBUTTYA/1_d_vybyttya`] = getVal('exit_date'); // robust spelling sync
            
            let explanationVal = getVal('exit_explanation');
            const isDeathReason = exitReasonVal.trim() === "пом." || exitReasonVal.toLowerCase().includes("смерт") || exitReasonVal.toLowerCase().includes("пом");
            
            if (isDeathReason) {
                explanationVal = "";
                document.getElementById('exit_explanation').value = "";
            }
            updates[`06_VYBUTTYA/3_primitka`] = explanationVal; // Sync to vybuttya primitka for absolute reliability!
            updates[`06_VYBUTTYA/vybuv_prymitka`] = explanationVal; // Sync to vybuv_prymitka as requested!

            // Collect Group/Address movement history biography rows
            const movementRows = document.querySelectorAll('.movement-row');
            const movementHistory = [];
            movementRows.forEach(row => {
                const d_begin = row.querySelector('.movement-begin').value.trim();
                const d_end = row.querySelector('.movement-end').value.trim();
                const group_name = row.querySelector('.movement-group').value.trim();
                const address = row.querySelector('.movement-address').value.trim();
                if (d_begin || d_end || group_name || address) {
                    movementHistory.push({ d_begin, d_end, group_name, address });
                }
            });
            updates[`04_STRUCTURA/movement_history`] = movementHistory;

            const singleMemberUrl = `${dbBaseUrl}/members/${targetId}.json?auth=${DB_SECRET}`;

            try {
                const res = await fetch(singleMemberUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (!res.ok) throw new Error("Помилка збереження через REST");
                
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                
                loadDatabase();
            } catch (error) {
                console.error("Помилка збереження:", error);
                alert("Не вдалося зберегти дані!");
            }
        };

        function initGrayListeners() {
            document.querySelectorAll('input[type="text"], textarea, select').forEach(el => {
                if (el.id === 'spouse_id' || el.id === 'docId' || el.id === 'pibHidden' || el.id === 'pib_01' || el.id === 'pib_main' || el.id === 'pib_edit' || el.id === 'spouse_status' || el.id === 'partner_name_input') {
                    el.style.color = '#ffffff';
                    el.classList.remove('text-gray-500');
                    return;
                }
                
                applyGrayForNA(el);

                el.addEventListener('input', () => applyGrayForNA(el));
                el.addEventListener('change', () => applyGrayForNA(el));
                el.addEventListener('focus', () => {
                    if (el.value.trim() === 'н/д') {
                        el.style.color = '#ffffff';
                    }
                });
                el.addEventListener('blur', () => {
                    if (el.value.trim() === '') {
                        el.value = 'н/д';
                    }
                    applyGrayForNA(el);
                });
            });
        }

        setTimeout(initGrayListeners, 200);

        checkAuth();
    </script>
</body>
</html>
