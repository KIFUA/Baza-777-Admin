<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління Базою Даних (Realtime Database)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        cardBg: '#1a1a1a',
                        inputBg: '#262626',
                        borderClr: '#333333'

        html { overflow-y: auto; scroll-behavior: smooth; }
        body { background-color: #121212; color: #e0e0e0; overflow-y: auto; }

        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        input, select, textarea { padding: 5px 8px !important; font-size: 0.85rem !important; }

<body class="p-3 flex justify-center min-h-screen">

        <div class="flex flex-col gap-1 my-1">

            <input type="hidden" id="pib_main">
            <input type="hidden" id="stat">
            <input type="hidden" id="pib_edit">
            <input type="hidden" id="family_status">

            <div class="space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-gray-400">Дата народження</label>

            <div class="border-t border-borderClr pt-2 space-y-2">

                <div class="grid grid-cols-2 gap-2">

                </div>
            </div>

            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-purple-400 tracking-wider">Структура</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Район / Дільниця</label>
                        <input type="text" id="rayon" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Опіка / Пресвітер</label>
                        <input type="text" id="opika" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Група</label>
                        <input type="text" id="group_name" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Дата водного хрещення</label>
                        <input type="text" id="d_vodnogo" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Дата вступу</label>
                        <input type="text" id="d_vstupu" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] text-purple-400">Сан</label>
                        <input type="text" id="san" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Звідки прибув (примітка)</label>
                        <input type="text" id="zvidky" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                   <div>
                        <label class="block text-[11px] text-purple-400">Відвідуваність</label>
                        <input type="text" id="vidviduvanist" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-purple-400">Присутність</label>
                        <input type="text" id="prysutnist" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="border-t border-borderClr pt-2 space-y-2">
                <h3 class="text-[10px] uppercase font-bold text-orange-400 tracking-wider">Історія служіння</h3>
                <div>
                      <label class="block text-[11px] text-orange-400">Служіння</label>
                      <textarea id="slujinnya" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-blue-500 outline-none" rows="4"></textarea>
                </div>
            </div>


            <div class="border-t border-borderClr pt-2 bg-amber-950/20 p-2 rounded border border-amber-900/40 grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] text-amber-500">Причина вибуття</label>
                    <input type="text" id="exit_reason" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block text-[11px] text-amber-500">Дата вибуття</label>
                    <input type="text" id="exit_date" class="w-full bg-inputBg border border-borderClr rounded text-white focus:border-amber-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-xs transition shadow-md">ЗБЕРЕГТИ ЗМІНИ</button>
        </form>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded shadow-lg text-xs font-semibold z-50 opacity-0 transition-opacity duration-300 pointer-events-none">Дані оновлено</div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCXS4eosvwO674SLQW_T5pPLpFwQHrOeJc",
            authDomain: "baza-777.firebaseapp.com",
            databaseURL: "https://baza-777-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baza-777",
            storageBucket: "baza-777.firebasestorage.app",
            messagingSenderId: "842089900940",
            appId: "1:842089900940:web:f9f3e355795fe0280844a9",
            measurementId: "G-5WD0HKPW7C"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        let allMembers = [];
        const statusEl = document.getElementById('dbStatus');

        function detectGenderWord(pib) {
            if (!pib) return "брат";
            const p = String(pib).trim().toLowerCase();
            const parts = p.split(/\s+/);
            
            for (const part of parts) {
                if (part.endsWith('івна') || part.endsWith('евна') || part.endsWith('овна') || part.endsWith('ична') || part.endsWith('ічна') || part.endsWith('на')) {
                    return "сестра";
                }
            }
            for (const part of parts) {
                if (part.endsWith('ович') || part.endsWith('евич') || part.endsWith('ич')) {
                    return "брат";
                }
            }
            if (p.endsWith('на') || p.endsWith('ва') || p.endsWith('а') || p.endsWith('я')) {
                return "сестра";
            }
            return "брат";
        }

        function togglePartnerIdField() {
            const status = document.getElementById('spouse_status').value;
            const container = document.getElementById('partner_id_container');
            const endDateContainer = document.getElementById('partner_end_date_container');
            const startDateContainer = document.getElementById('partner_start_date_container');
            
            if (container) {
                if (status === "одр.") {
                    container.classList.remove('hidden');
                } else {
                    container.classList.add('hidden');
                }
            }
            
            if (endDateContainer) {
                if (status === "розлуч." || status === "вдов.") {
                    endDateContainer.classList.remove('hidden');
                } else {
                    endDateContainer.classList.add('hidden');
                }
            }

            if (startDateContainer) {
                if (status === "неодруж." || status === "") {
                    startDateContainer.classList.add('hidden');
                } else {
                    startDateContainer.classList.remove('hidden');
                }
            }
        }

        window.toggleChildren = function() {
            const area = document.getElementById('dity');
            const arrow = document.getElementById('childrenArrow');
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                arrow.textContent = '▲';
            } else {
                area.classList.add('hidden');
                arrow.textContent = '▼';
            }
        }


        async function loadDatabase() {
            try {
                statusEl.textContent = "Завантаження...";
                const dbRef = ref(rtdb, 'members');
                const snapshot = await get(dbRef);
                
                if (snapshot.exists()) {
                    allMembers = [];
                    const data = snapshot.val();

                    Object.keys(data).forEach((id) => {
                        const nested = data[id];
                        if (nested) {
                            // Пряме зчитування імені з 01_PIB або з pib
                            let pibName = nested["01_PIB"] || nested["pib"];
                            
                            // Захисна перевірка на випадок відсутності поля
                            if (!pibName) {
                                pibName = `Користувач №${id}`;
                            }
                            
                            allMembers.push({
                                id: id,
                                pib: pibName,
                                rawData: nested
                            });
                        }
                    });
                    statusEl.textContent = `У базі: ${allMembers.length} осіб`;
                    
                    // Контрольний лог для перевірки в F12
                    console.log("Перші 5 записів у масиві пошуку:", allMembers.slice(0, 5));
                    
                } else {
                    statusEl.textContent = "База порожня";
                }
            } catch (error) {
                console.error("Помилка завантаження з RTDB:", error);
                statusEl.textContent = "Помилка доступу!";
            }
        }
        loadDatabase();

        function updateSelectColor(selectElement) {
            if (selectElement.value === "") {
                selectElement.classList.add('text-gray-500');
            } else {
                selectElement.classList.remove('text-gray-500');
            }
        }

        const spouseStatusEl = document.getElementById('spouse_status');
        spouseStatusEl.addEventListener('change', () => {
            updateSelectColor(spouseStatusEl);
            togglePartnerIdField();
        });

        // Initialize color on page load
        updateSelectColor(spouseStatusEl);

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const selectedHeaderPIB = document.getElementById('selectedHeaderPIB');
        const memberForm = document.getElementById('memberForm');

        searchInput.addEventListener('input', (e) => {
            const txt = e.target.value.trim().toLowerCase();
            if(txt.length < 1) {
                searchResults.classList.add('hidden');
                return;
            }
            
            const matched = allMembers.filter(m => {
                if (!m.pib) return false;
                const pibString = String(m.pib).toLowerCase();
                return pibString.includes(txt);
            });
            
            searchResults.innerHTML = '';
            
            if(matched.length === 0) {
                searchResults.innerHTML = '<li class="p-2 text-xs text-gray-500 text-center">Нічого не знайдено</li>';
            } else {
                matched.forEach(m => {
                    const li = document.createElement('li');
                    li.className = 'p-2 text-xs hover:bg-zinc-700 cursor-pointer text-gray-200';
                    li.textContent = `${m.pib} (ID: ${m.id})`;
                    li.onclick = () => selectMember(m.id);
                    searchResults.appendChild(li);
                });
            }
            searchResults.classList.remove('hidden');
        });

        function valOrEmpty(val) {
            return (val === undefined || val === null) ? '' : String(val);
        }

        function parseDityText(text) {
            if (!text || text.trim() === '') return [];
            return text.split('\n').map(line => {
                const parts = line.split('-').map(p => p.trim());
                return { name: parts[0] || '', birthday: parts[1] || '' };
            }).filter(item => item.name || item.birthday);
        }

        function formatDityJson(jsonArray) {
            if (!Array.isArray(jsonArray)) return '';
            return jsonArray.map(item => `${item.name || ''} - ${item.birthday || ''}`).join('\n');
        }

        function safeStringify(arr) {
            if (!arr) return '[]';
            try {
                return JSON.stringify(arr, null, 2);
            } catch(e) {
                return '[]';
            }
        }

        function selectMember(id) {
            const member = allMembers.find(m => m.id === id);
            if(!member) return;

            searchResults.classList.add('hidden');
            searchInput.value = '';
            
            selectedHeaderPIB.textContent = String(member.pib).toUpperCase();
            memberForm.classList.remove('hidden');

            document.getElementById('docId').value = member.id;
            document.getElementById('pibHidden').value = member.pib;
            document.getElementById('idDisplay').textContent = `ID: ${member.id}`;
            document.getElementById('pib_edit').value = valOrEmpty(member.rawData["01_PIB"] || member.rawData["pib"] || member.pib);

            document.getElementById('pib_01').value = valOrEmpty(member.rawData["01_PIB"] || member.rawData["pib"]);
            document.getElementById('pib_main').value = valOrEmpty(member.rawData["pib"] || member.rawData["01_PIB"]);

            const personal = member.rawData["02_OSOBYSTE"] || {};
            const address = member.rawData["03_ADRESA"] || {};
            const structura = member.rawData["04_STRUCTURA"] || {};
            const vybuttya = member.rawData["06_VYBUTTYA"] || {};
            
            const shlyubArray = personal["4_shlyub_history"];
            const shlyubHistory = (Array.isArray(shlyubArray) && shlyubArray.length > 0) ? shlyubArray[0] : {};

            document.getElementById('stat').value = valOrEmpty(personal["2_stat"]);
            document.getElementById('d_nar').value = valOrEmpty(personal["1_d_narodjennya"] || personal["3_d_nar"]);
            document.getElementById('tel').value = valOrEmpty(personal["2_tel"] || personal["phone"] || personal["tel"]);
            
            const povnaSimya = personal["5_povna_simya"];
            if (povnaSimya === true || povnaSimya === "true") {
                document.getElementById('family_status').value = "true";
            } else if (povnaSimya === false || povnaSimya === "false") {
                document.getElementById('family_status').value = "false";
            } else {
                document.getElementById('family_status').value = "";
            }

            document.getElementById('education').value = valOrEmpty(personal["7_osvita"]);
            document.getElementById('profession').value = valOrEmpty(personal["8_profesiya"]);
            document.getElementById('social_status').value = valOrEmpty(personal["6_socialniy"]);
            document.getElementById('messengers').value = valOrEmpty(personal["3_messengers"]);
            document.getElementById('dity').value = formatDityJson(personal["9_dity"]);
            document.getElementById('status').value = valOrEmpty(personal["13_status"]);

            document.getElementById('addr_city').value = valOrEmpty(address["1_misto"] || address["1_nas_punkt"]);
            document.getElementById('addr_street').value = valOrEmpty(address["2_vulycja"] || address["2_vulitsya"]);
            document.getElementById('addr_house').value = valOrEmpty(address["3_budynok"] || address["3_budinok"]);
            document.getElementById('addr_korpus').value = valOrEmpty(address["4_korpus"]);
            document.getElementById('addr_flat').value = valOrEmpty(address["5_kvartyra"] || address["4_kvartira"]);

            document.getElementById('rayon').value = valOrEmpty(structura["1_rayon"] || personal["rayon"]);
            document.getElementById('opika').value = valOrEmpty(structura["4_opika"] || personal["opika"]);
            document.getElementById('group_name').value = valOrEmpty(structura["2_grupa"]);
            document.getElementById('d_vodnogo').value = valOrEmpty(structura["5_d_vodnogo"]);
            document.getElementById('d_vstupu').value = valOrEmpty(structura["6_d_vstupu"]);
            document.getElementById('san').value = valOrEmpty(structura["3_san"]);
            document.getElementById('zvidky').value = valOrEmpty(structura["7_zvidky_primitka"]);
            document.getElementById('vidviduvanist').value = valOrEmpty(structura["8_vidviduvanist"]);
            document.getElementById('prysutnist').value = valOrEmpty(structura["9_prysutnist"]);
            document.getElementById('slujinnya').value = member.rawData["05_ISTORIJA"] ? safeStringify(member.rawData["05_ISTORIJA"]["1_slujinnya"]) : '[]';

            document.getElementById('spouse_status').value = valOrEmpty(shlyubHistory["status"]);
            updateSelectColor(document.getElementById('spouse_status'));
            togglePartnerIdField();
            document.getElementById('d_shlyub_from').value = valOrEmpty(shlyubHistory["d_shlyubu_begin"]);
            document.getElementById('d_shlyub_end').value = valOrEmpty(shlyubHistory["d_shlyubu_end"]);
            const sId = valOrEmpty(shlyubHistory["podruzhzhya_id"] || shlyubHistory["podrujya_id"]);
            document.getElementById('spouse_id').value = sId;
            
            const partner = allMembers.find(m => String(m.id) === String(sId));
            document.getElementById('partner_name_input').value = partner ? partner.pib : (sId ? "" : "");

            document.getElementById('exit_reason').value = valOrEmpty(vybuttya["2_prichina"]);
            document.getElementById('exit_date').value = valOrEmpty(vybuttya["1_d_vybuttya"]);
        }

        document.getElementById('btnNewCard').onclick = () => {
            memberForm.reset();
            const newPib = prompt("Введіть ПІБ для нового запису:");
            if(!newPib) return;
            
            const nextId = allMembers.length > 0 ? Math.max(...allMembers.map(m => parseInt(m.id))) + 1 : 1;
            
            document.getElementById('docId').value = nextId;
            document.getElementById('pibHidden').value = newPib;
            document.getElementById('pib_01').value = newPib;
            document.getElementById('pib_main').value = newPib;
            document.getElementById('stat').value = detectGenderWord(newPib);
            document.getElementById('idDisplay').textContent = `Новий запис ID: ${nextId}`;
            document.getElementById('pib_edit').value = newPib;
            selectedHeaderPIB.textContent = newPib.toUpperCase();
            memberForm.classList.remove('hidden');
            updateSelectColor(document.getElementById('spouse_status'));
            togglePartnerIdField();
        };

        memberForm.onsubmit = async (e) => {
            e.preventDefault();
            const targetId = document.getElementById('docId').value;
            if(!targetId) return;

            const updates = {};
            const editedPibVal = document.getElementById('pib_edit').value.trim();
            const editedPib01 = editedPibVal;
            const editedPibMain = editedPibVal;

            updates[`members/${targetId}/01_PIB`] = editedPib01;
            updates[`members/${targetId}/pib`] = editedPibMain;
            
            const computedStat = detectGenderWord(editedPib01 || editedPibMain);
            document.getElementById('stat').value = computedStat;
            updates[`members/${targetId}/02_OSOBYSTE/2_stat`] = computedStat;

            updates[`members/${targetId}/02_OSOBYSTE/1_d_narodjennya`] = document.getElementById('d_nar').value;
            updates[`members/${targetId}/02_OSOBYSTE/3_d_nar`] = document.getElementById('d_nar').value;
            updates[`members/${targetId}/02_OSOBYSTE/2_tel`] = document.getElementById('tel').value;
            updates[`members/${targetId}/02_OSOBYSTE/phone`] = document.getElementById('tel').value;
            
            const spouseStatus = document.getElementById('spouse_status').value;
            const spouseName = document.getElementById('partner_name_input').value.trim();
            const partnerMatch = allMembers.find(m => String(m.pib).trim().toLowerCase() === spouseName.toLowerCase());
            const spouseIdVal = partnerMatch ? partnerMatch.id : document.getElementById('spouse_id').value;
            let isPovna = false;
            if (spouseStatus === "одр.") {
                isPovna = (spouseIdVal !== "");
            }
            document.getElementById('family_status').value = isPovna ? "true" : "false";
            updates[`members/${targetId}/02_OSOBYSTE/5_povna_simya`] = isPovna;
            
            updates[`members/${targetId}/02_OSOBYSTE/7_osvita`] = document.getElementById('education').value;
            updates[`members/${targetId}/02_OSOBYSTE/8_profesiya`] = document.getElementById('profession').value;
            updates[`members/${targetId}/02_OSOBYSTE/6_socialniy`] = document.getElementById('social_status').value;
            updates[`members/${targetId}/02_OSOBYSTE/3_messengers`] = document.getElementById('messengers').value;
            updates[`members/${targetId}/02_OSOBYSTE/9_dity`] = parseDityText(document.getElementById('dity').value);
            updates[`members/${targetId}/02_OSOBYSTE/13_status`] = document.getElementById('status').value;
            
            updates[`members/${targetId}/04_STRUCTURA/1_rayon`] = document.getElementById('rayon').value;
            updates[`members/${targetId}/04_STRUCTURA/4_opika`] = document.getElementById('opika').value;
            updates[`members/${targetId}/04_STRUCTURA/2_grupa`] = document.getElementById('group_name').value;
            updates[`members/${targetId}/04_STRUCTURA/5_d_vodnogo`] = document.getElementById('d_vodnogo').value;
            updates[`members/${targetId}/04_STRUCTURA/6_d_vstupu`] = document.getElementById('d_vstupu').value;
            updates[`members/${targetId}/04_STRUCTURA/3_san`] = document.getElementById('san').value;
            updates[`members/${targetId}/04_STRUCTURA/7_zvidky_primitka`] = document.getElementById('zvidky').value;
            updates[`members/${targetId}/04_STRUCTURA/8_vidviduvanist`] = document.getElementById('vidviduvanist').value;
            updates[`members/${targetId}/04_STRUCTURA/9_prysutnist`] = document.getElementById('prysutnist').value;
            try {
                updates[`members/${targetId}/05_ISTORIJA/1_slujinnya`] = JSON.parse(document.getElementById('slujinnya').value || '[]');
            } catch(e) { updates[`members/${targetId}/05_ISTORIJA/1_slujinnya`] = []; }
            
            updates[`members/${targetId}/03_ADRESA/1_misto`] = document.getElementById('addr_city').value;
            updates[`members/${targetId}/03_ADRESA/1_nas_punkt`] = document.getElementById('addr_city').value;
            updates[`members/${targetId}/03_ADRESA/2_vulycja`] = document.getElementById('addr_street').value;
            updates[`members/${targetId}/03_ADRESA/2_vulitsya`] = document.getElementById('addr_street').value;
            updates[`members/${targetId}/03_ADRESA/3_budynok`] = document.getElementById('addr_house').value;
            updates[`members/${targetId}/03_ADRESA/3_budinok`] = document.getElementById('addr_house').value;
            updates[`members/${targetId}/03_ADRESA/4_korpus`] = document.getElementById('addr_korpus').value;
            updates[`members/${targetId}/03_ADRESA/5_kvartyra`] = document.getElementById('addr_flat').value;
            updates[`members/${targetId}/03_ADRESA/4_kvartira`] = document.getElementById('addr_flat').value;
 
            updates[`members/${targetId}/02_OSOBYSTE/4_shlyub_history/0/status`] = document.getElementById('spouse_status').value;
            updates[`members/${targetId}/02_OSOBYSTE/4_shlyub_history/0/d_shlyubu_begin`] = document.getElementById('d_shlyub_from').value;
            updates[`members/${targetId}/02_OSOBYSTE/4_shlyub_history/0/d_shlyubu_end`] = document.getElementById('d_shlyub_end').value;
            
            updates[`members/${targetId}/02_OSOBYSTE/4_shlyub_history/0/podruzhzhya_id`] = partnerMatch ? partnerMatch.id : spouseIdVal;
 
            updates[`members/${targetId}/06_VYBUTTYA/2_prichina`] = document.getElementById('exit_reason').value;
            updates[`members/${targetId}/06_VYBUTTYA/1_d_vybuttya`] = document.getElementById('exit_date').value;

            try {
                await update(ref(rtdb), updates);
                
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                
                loadDatabase();
            } catch (error) {
                console.error("Помилка збереження:", error);
                alert("Не вдалося зберегти дані!");
            }
        };

    </script>
</body>
</html>
